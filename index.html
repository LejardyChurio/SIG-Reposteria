<!DOCTYPE html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIG Repostería Artesanal</title>
  <!-- Favicon neutral, pastel minimalista SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cellipse cx='24' cy='38' rx='16' ry='6' fill='%23facc15'/%3E%3Cpath d='M8 38V24c0-8.8 8-14 16-14s16 5.2 16 14v14' fill='%23fff' stroke='%23facc15' stroke-width='2'/%3E%3Cellipse cx='24' cy='24' rx='12' ry='6' fill='%23fde68a' stroke='%23facc15' stroke-width='1.5'/%3E%3C/svg%3E"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #f8fafc; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    .sidebar, .bottom-nav { background: #1e293b; color: #fff; }
    .sidebar { width: 220px; min-height: 100vh; padding: 24px 12px 0 12px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; }
    .sidebar .logo { display: flex; align-items: center; margin-bottom: 32px; }
    .sidebar .logo svg {
      width: 44px; height: 44px; max-width: 50px; max-height: 50px; margin-right: 10px; display: block;
    }
    .sidebar .logo span { font-size: 1.3rem; font-weight: bold; letter-spacing: 1px; }
    .sidebar .nav-btn { background: none; border: none; color: #fff; text-align: left; padding: 12px 8px; margin-bottom: 8px; border-radius: 6px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; width: 100%; }
    .sidebar .nav-btn.active, .sidebar .nav-btn:hover { background: #334155; }
    .sidebar .nav-btn svg { width: 24px; height: 24px; margin-right: 8px; flex-shrink: 0; fill: currentColor; }
    .main-content { margin-left: 220px; padding: 32px 16px 16px 16px; min-height: 100vh; }
    .spa-view { display: none; }
    .spa-view.active { display: block; }
    .kpi-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .kpi-card { background: #1e293b; color: #fff; border-radius: 12px; padding: 20px 12px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 8px #0001; }
    .kpi-card svg { width: 36px; height: 36px; margin-bottom: 8px; }
    .alerta-critica { animation: parpadeo 1s infinite alternate; background: #dc2626; color: #fff; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 18px; }
    @keyframes parpadeo { from { opacity: 1; } to { opacity: 0.4; } }
    .form-card, .table-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px #0001; padding: 16px; margin-bottom: 24px; width: 100%; }
    .form-card { max-width: 480px; }
    .form-card label { font-weight: 500; margin-bottom: 4px; display: block; }
    .form-card input, .form-card select { width: 100%; padding: 8px 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; }
    .form-card button { background: #1e293b; color: #fff; border: none; border-radius: 6px; padding: 10px 0; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
    .form-card button:hover { background: #334155; }
    .table-card { overflow-x: auto; }
    .table-card table { width: 100%; border-collapse: collapse; font-size: 0.92rem; min-width: 400px; }
    .table-card th, .table-card td { padding: 8px 8px; text-align: left; white-space: nowrap; }
    .table-card th { background: #e2e8f0; }
    .table-card tr.critico { background: #fee2e2; }
    .table-card tr { border-bottom: 1px solid #e5e7eb; }
    .btn-entregado { background: #16a34a; color: #fff; border: none; border-radius: 5px; padding: 5px 10px; font-size: 0.88rem; cursor: pointer; white-space: nowrap; }
    .btn-entregado:hover { background: #166534; }
    .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #facc15; color: #1e293b; padding: 10px 24px; border-radius: 8px; font-weight: bold; z-index: 9999; display: none; max-width: 90vw; text-align: center; }
    .bottom-nav { display: none; position: fixed; left: 0; right: 0; bottom: 0; background: #1e293b; color: #fff; height: 60px; align-items: center; justify-content: space-around; z-index: 100; }
    .bottom-nav .nav-btn { background: none; border: none; color: #fff; font-size: 0.72rem; display: flex; flex-direction: column; align-items: center; padding: 4px 2px; flex: 1; }
    .bottom-nav .nav-btn.active, .bottom-nav .nav-btn:hover { color: #facc15; }
    .bottom-nav svg { width: 22px; height: 22px; margin-bottom: 2px; fill: currentColor; display: block; }
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 16px 10px 80px 10px; }
      .bottom-nav { display: flex; }
      .form-card { max-width: 100%; }
      .kpi-cards { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .kpi-card { padding: 14px 8px; font-size: 0.9rem; }
    }
    @media (max-width: 480px) {
      .kpi-cards { grid-template-columns: repeat(2, 1fr); }
      .table-card th, .table-card td { padding: 6px 6px; font-size: 0.82rem; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="sidebar">
    <div class="logo">
      <!-- Logo SVG: Pastel artesanal refinado, simétrico y escalado -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="24" cy="38" rx="16" ry="6" fill="#facc15"/>
        <path d="M8 38V24c0-8.8 8-14 16-14s16 5.2 16 14v14" fill="#fff" stroke="#facc15" stroke-width="2"/>
        <ellipse cx="24" cy="24" rx="12" ry="6" fill="#fde68a" stroke="#facc15" stroke-width="1.5"/>
        <circle cx="24" cy="18" r="2.2" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
        <path d="M34 18 Q36 12 32 10" stroke="#a3a3a3" stroke-width="1.2" fill="none"/>
        <ellipse cx="32" cy="10" rx="1.2" ry="2.2" fill="#fff" stroke="#a3a3a3" stroke-width="0.8"/>
      </svg>
      <span style="font-size:1.3rem;font-weight:bold;letter-spacing:1px;line-height:1;">SIG Repostería</span>
    </div>
    <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')"><svg viewBox="0 0 24 24"><path d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0L22.25 12M4.5 10.5V19.5A2.25 2.25 0 006.75 21.75h2.25m6 0h2.25A2.25 2.25 0 0019.5 19.5V10.5m-15 0L12 3.75m0 0l7.5 6.75" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Dashboard</button>
    <button class="nav-btn" data-view="inventario" onclick="switchView('inventario')"><svg viewBox="0 0 24 24"><path d="M3 7.5V6a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 6v1.5M3 7.5h18m-18 0v9A2.25 2.25 0 005.25 18.75h13.5A2.25 2.25 0 0021 16.5v-9m-9 6.75h3.75m-3.75 0V12m0 1.5V12" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Inventario</button>
    <button class="nav-btn" data-view="mermas" onclick="switchView('mermas')"><svg viewBox="0 0 24 24"><path d="M12 9v3.75m0 3.75h.008v.008H12v-.008zm9.53 2.22a1.5 1.5 0 01-1.28 2.28H3.75a1.5 1.5 0 01-1.28-2.28l8.25-14.25a1.5 1.5 0 012.56 0l8.25 14.25z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Mermas</button>
    <button class="nav-btn" data-view="pedidos" onclick="switchView('pedidos')"><svg viewBox="0 0 24 24"><path d="M6.75 3v2.25m10.5-2.25v2.25M3.75 7.5h16.5m-16.5 0A2.25 2.25 0 003 9.75v8.25A2.25 2.25 0 005.25 20.25h13.5A2.25 2.25 0 0021 18V9.75a2.25 2.25 0 00-2.25-2.25m-16.5 0V6A2.25 2.25 0 015.25 3.75h13.5A2.25 2.25 0 0121 6v1.5" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Pedidos</button>
    <button class="nav-btn" data-view="recetas" onclick="switchView('recetas')"><svg viewBox="0 0 24 24"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Recetas</button>
  </div>
  <div class="main-content">
    <div id="alertas"></div>
    <div id="dashboard-view" class="spa-view active"></div>
    <div id="inventario-view" class="spa-view"></div>
    <div id="mermas-view" class="spa-view"></div>
    <div id="pedidos-view" class="spa-view"></div>
    <div id="recetas-view" class="spa-view"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')"><svg viewBox="0 0 24 24"><path d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0L22.25 12M4.5 10.5V19.5A2.25 2.25 0 006.75 21.75h2.25m6 0h2.25A2.25 2.25 0 0019.5 19.5V10.5m-15 0L12 3.75m0 0l7.5 6.75" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Dashboard</span></button>
    <button class="nav-btn" data-view="inventario" onclick="switchView('inventario')"><svg viewBox="0 0 24 24"><path d="M3 7.5V6a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 6v1.5M3 7.5h18m-18 0v9A2.25 2.25 0 005.25 18.75h13.5A2.25 2.25 0 0021 16.5v-9m-9 6.75h3.75m-3.75 0V12m0 1.5V12" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Inventario</span></button>
    <button class="nav-btn" data-view="mermas" onclick="switchView('mermas')"><svg viewBox="0 0 24 24"><path d="M12 9v3.75m0 3.75h.008v.008H12v-.008zm9.53 2.22a1.5 1.5 0 01-1.28 2.28H3.75a1.5 1.5 0 01-1.28-2.28l8.25-14.25a1.5 1.5 0 012.56 0l8.25 14.25z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Mermas</span></button>
    <button class="nav-btn" data-view="pedidos" onclick="switchView('pedidos')"><svg viewBox="0 0 24 24"><path d="M6.75 3v2.25m10.5-2.25v2.25M3.75 7.5h16.5m-16.5 0A2.25 2.25 0 003 9.75v8.25A2.25 2.25 0 005.25 20.25h13.5A2.25 2.25 0 0021 18V9.75a2.25 2.25 0 00-2.25-2.25m-16.5 0V6A2.25 2.25 0 015.25 3.75h13.5A2.25 2.25 0 0121 6v1.5" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Pedidos</span></button>
    <button class="nav-btn" data-view="recetas" onclick="switchView('recetas')"><svg viewBox="0 0 24 24"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Recetas</span></button>
  </div>
  <script>
    // --- Supabase ---
    const SUPABASE_URL = 'https://ejcsptynoutfddlhiuze.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqY3NwdHlub3V0ZmRkbGhpdXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTEyMDksImV4cCI6MjA5Nzg4NzIwOX0.d4LEscd36tsIlkSkl1gkaksLGZAw1U2PNXE4qdioylI';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- Estado ---
    let state = { inventario: [], mermas: [], pedidos: [], recetas: [] };

    async function loadFromSupabase() {
      try {
        const [inv, rec, mer, ped] = await Promise.all([
          db.from('inventario').select('*').order('id'),
          db.from('recetas').select('*').order('id'),
          db.from('mermas').select('*').order('id'),
          db.from('pedidos').select('*').order('id')
        ]);
        if (inv.data) state.inventario = inv.data;
        if (rec.data) state.recetas = rec.data;
        if (mer.data) state.mermas = mer.data;
        if (ped.data) state.pedidos = ped.data;
      } catch(err) {
        showToast('Error conectando con Supabase');
      }
    }

    // --- Utilidades UI ---
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2200);
    }

    // --- SPA Navegación ---
    function switchView(view) {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-view') === view);
      });
      document.querySelectorAll('.spa-view').forEach(div => {
        div.classList.remove('active');
      });
      const v = document.getElementById(view+'-view');
      if (v) v.classList.add('active');
      if (view === 'dashboard') renderDashboard();
      if (view === 'inventario') renderInventario();
      if (view === 'mermas') renderMermas();
      if (view === 'pedidos') renderPedidos();
      if (view === 'recetas') renderRecetas();
    }
    window.switchView = switchView;

    // --- Renderizado de Vistas ---
    function renderDashboard() {
      const el = document.getElementById('dashboard-view');
      let totalPedidos = state.pedidos.length;
      let insumosCriticos = state.inventario.filter(i => i.stock_actual <= i.stock_seguridad).length;
      let totalMermas = state.mermas.length;
      el.innerHTML = `
        <div class="kpi-cards">
          <div class="kpi-card"><svg viewBox="0 0 24 24"><path d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0L22.25 12" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><div><b>${state.inventario.length}</b> Insumos</div></div>
          <div class="kpi-card"><svg viewBox="0 0 24 24"><path d="M12 9v3.75m0 3.75h.008v.008H12v-.008zm9.53 2.22a1.5 1.5 0 01-1.28 2.28H3.75a1.5 1.5 0 01-1.28-2.28l8.25-14.25a1.5 1.5 0 012.56 0l8.25 14.25z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><div><b>${totalMermas}</b> Mermas</div></div>
          <div class="kpi-card"><svg viewBox="0 0 24 24"><path d="M6.75 3v2.25m10.5-2.25v2.25M3.75 7.5h16.5" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><div><b>${totalPedidos}</b> Pedidos</div></div>
        </div>
        ${insumosCriticos > 0 ? `<div class="alerta-critica">¡Atención! Hay ${insumosCriticos} insumos en nivel crítico.</div>` : ''}
      `;
    }
    window.renderDashboard = renderDashboard;

    function renderInventario() {
      const el = document.getElementById('inventario-view');
      // Simulación de movimientos con timestamp para RF-01
      el.innerHTML = `
        <div class="table-card">
          <h3>Inventario de Insumos</h3>
          <table><thead><tr><th>Nombre</th><th>Stock</th><th>Seguridad</th><th>Unidad</th><th></th></tr></thead><tbody>
            ${state.inventario.map(i => `
              <tr${i.stock_actual <= i.stock_seguridad ? ' class="critico"' : ''}>
                <td>${i.nombre}</td>
                <td>${i.stock_actual}</td>
                <td>${i.stock_seguridad}</td>
                <td>${i.unidad_medida}</td>
                <td><button onclick="deleteInsumo(${i.id})">Eliminar</button></td>
              </tr>
            `).join('')}
          </tbody></table>
        </div>
        <div class="form-card">
          <h3>Agregar Insumo</h3>
          <form onsubmit="return addInsumo(event)">
            <label>Nombre</label>
            <input type="text" id="insumo-nombre" required>
            <label>Stock Inicial</label>
            <input type="number" id="insumo-stock" min="0" step="0.01" required>
            <label>Stock Seguridad</label>
            <input type="number" id="insumo-seguridad" min="0" step="0.01" required>
            <label>Unidad de Medida</label>
            <select id="insumo-unidad" required>
              <option value="">Seleccione...</option>
              <optgroup label="Peso">
                <option value="kg">kg — Kilogramo</option>
                <option value="g">g — Gramo</option>
                <option value="lb">lb — Libra</option>
              </optgroup>
              <optgroup label="Volumen">
                <option value="lt">lt — Litro</option>
                <option value="ml">ml — Mililitro</option>
              </optgroup>
              <optgroup label="Unidades">
                <option value="unid">unid — Unidad</option>
                <option value="docena">docena — Docena</option>
                <option value="paquete">paquete — Paquete</option>
                <option value="caja">caja — Caja</option>
                <option value="bolsa">bolsa — Bolsa</option>
              </optgroup>
            </select>
            <button type="submit">Agregar Insumo</button>
          </form>
        </div>
      `;
    }
    window.renderInventario = renderInventario;

    function renderMermas() {
      const el = document.getElementById('mermas-view');
      el.innerHTML = `
        <div class="form-card">
          <h3>Registrar Merma</h3>
          <form onsubmit="return addMerma(event)">
            <label>Insumo</label>
            <select id="merma-insumo" required>
              <option value="">Seleccione...</option>
              ${state.inventario.map(i => `<option value="${i.id}">${i.nombre} (${i.unidad_medida})</option>`).join('')}
            </select>
            <label>Cantidad</label>
            <input type="number" id="merma-cantidad" min="0.01" step="0.01" required>
            <label>Motivo</label>
            <select id="merma-motivo" required>
              <option value="">Seleccione...</option>
              <option value="vencimiento">Vencimiento</option>
              <option value="daño operativo">Daño operativo</option>
              <option value="excedente">Excedente</option>
              <option value="operativo">Otro operativo</option>
            </select>
            <button type="submit">Registrar Merma</button>
          </form>
        </div>
        <div class="table-card">
          <h3>Historial de Mermas</h3>
          <table><thead><tr><th>Insumo</th><th>Cantidad</th><th>Motivo</th><th>Fecha</th></tr></thead><tbody>
            ${state.mermas.slice().reverse().map(m => {
              const insumo = state.inventario.find(i => i.id === m.id_insumo);
              return `<tr><td>${insumo ? insumo.nombre : 'Desconocido'}</td><td>${m.cantidad_merma}</td><td>${m.motivo_merma || '—'}</td><td>${m.timestamp ? new Date(m.timestamp).toLocaleString('es-VE') : '—'}</td></tr>`;
            }).join('')}
          </tbody></table>
        </div>
      `;
      document.getElementById('form-merma-view') && null;
    }
    window.renderMermas = renderMermas;

    function renderPedidos() {
      const el = document.getElementById('pedidos-view');
      const recetasMap = state.recetas.reduce((acc, r) => { acc[r.id] = r.nombre; return acc; }, {});
      const recetasOpts = state.recetas.map(r => `<option value="${r.id}">${r.nombre}</option>`).join('');
      el.innerHTML = `
        <div class="table-card">
          <h3>Pedidos</h3>
          <table><thead><tr><th>Cliente</th><th>Receta</th><th>Cantidad</th><th>Estado</th><th></th></tr></thead><tbody>
            ${state.pedidos.map(p => `
              <tr>
                <td>${p.cliente}</td>
                <td>${recetasMap[p.receta_id] || '—'}</td>
                <td>${p.cantidad}</td>
                <td>${p.estado || 'Pendiente'}</td>
                <td>${p.estado !== 'Entregado' ? `<button class='btn-entregado' onclick='completePedido(${p.id})'>Marcar Entregado</button>` : ''}</td>
              </tr>
            `).join('')}
          </tbody></table>
        </div>
        <div class="form-card">
          <h3>Nuevo Pedido</h3>
          <form onsubmit="return addPedido(event)">
            <label>Cliente</label>
            <input type="text" id="pedido-cliente" required>
            <label>Receta</label>
            <select id="pedido-receta" required>
              <option value="">Seleccione una receta...</option>
              ${recetasOpts}
            </select>
            <label>Cantidad</label>
            <input type="number" id="pedido-cantidad" min="1" required>
            <button type="submit">Agregar Pedido</button>
          </form>
        </div>
      `;
    }
    window.renderPedidos = renderPedidos;

    // --- Acciones ---
    async function addInsumo(e) {
      e.preventDefault();
      const nombre = document.getElementById('insumo-nombre').value.trim();
      const stock = parseFloat(document.getElementById('insumo-stock').value);
      const seguridad = parseFloat(document.getElementById('insumo-seguridad').value);
      const unidad = document.getElementById('insumo-unidad').value.trim();
      if (!nombre || isNaN(stock) || isNaN(seguridad) || !unidad) return;
      const existente = state.inventario.find(i => i.nombre.toLowerCase() === nombre.toLowerCase());
      if (existente) {
        const nuevo_stock = existente.stock_actual + stock;
        const { error } = await db.from('inventario').update({ stock_actual: nuevo_stock, stock_seguridad: seguridad, unidad_medida: unidad }).eq('id', existente.id);
        if (!error) { existente.stock_actual = nuevo_stock; existente.stock_seguridad = seguridad; existente.unidad_medida = unidad; }
        else { showToast('Error actualizando insumo'); return; }
      } else {
        const { data, error } = await db.from('inventario').insert({ nombre, stock_actual: stock, stock_seguridad: seguridad, unidad_medida: unidad }).select().single();
        if (!error && data) state.inventario.push(data);
        else { showToast('Error agregando insumo'); return; }
      }
      showToast('Insumo actualizado');
      renderInventario();
      renderDashboard();
    }
    window.addInsumo = addInsumo;

    async function deleteInsumo(id) {
      const { error } = await db.from('inventario').delete().eq('id', id);
      if (!error) { state.inventario = state.inventario.filter(i => i.id !== id); showToast('Insumo eliminado'); renderInventario(); }
      else showToast('Error eliminando insumo');
    }
    window.deleteInsumo = deleteInsumo;

    async function addMerma(e) {
      e.preventDefault();
      const id_insumo = parseInt(document.getElementById('merma-insumo').value, 10);
      const cantidad_merma = parseFloat(document.getElementById('merma-cantidad').value);
      const motivo_merma = document.getElementById('merma-motivo').value;
      if (isNaN(id_insumo) || isNaN(cantidad_merma) || cantidad_merma <= 0 || !motivo_merma) return;
      const insumo = state.inventario.find(i => i.id === id_insumo);
      if (!insumo) return;
      const nuevo_stock = Math.max(0, insumo.stock_actual - cantidad_merma);
      const mermaData = { id_insumo, cantidad_merma, motivo_merma, timestamp: new Date().toISOString() };
      const { data, error } = await db.from('mermas').insert(mermaData).select().single();
      if (!error) {
        await db.from('inventario').update({ stock_actual: nuevo_stock }).eq('id', id_insumo);
        insumo.stock_actual = nuevo_stock;
        if (data) state.mermas.push(data);
        showToast('Merma registrada');
        renderMermas();
        renderDashboard();
      } else showToast('Error registrando merma');
    }
    window.addMerma = addMerma;

    async function addPedido(e) {
      e.preventDefault();
      const cliente = document.getElementById('pedido-cliente').value.trim();
      const receta_id = parseInt(document.getElementById('pedido-receta').value, 10);
      const cantidad = parseInt(document.getElementById('pedido-cantidad').value, 10);
      if (!cliente || isNaN(receta_id) || isNaN(cantidad) || cantidad < 1) return;
      const { data, error } = await db.from('pedidos').insert({ cliente, receta_id, cantidad, estado: 'Pendiente', fecha_entrega: new Date().toISOString().split('T')[0] }).select().single();
      if (!error && data) { state.pedidos.push(data); showToast('Pedido agregado'); renderPedidos(); }
      else showToast('Error agregando pedido');
    }
    window.addPedido = addPedido;

    function renderRecetas() {
      const el = document.getElementById('recetas-view');
      el.innerHTML = `
        <div class="table-card">
          <h3>Recetas</h3>
          <table><thead><tr><th>Nombre</th><th>Descripción</th><th></th></tr></thead><tbody>
            ${state.recetas.map(r => `
              <tr>
                <td>${r.nombre}</td>
                <td>${r.descripcion}</td>
                <td><button onclick="deleteReceta(${r.id})">Eliminar</button></td>
              </tr>
            `).join('')}
          </tbody></table>
        </div>
        <div class="form-card">
          <h3>Nueva Receta</h3>
          <form onsubmit="return addReceta(event)">
            <label>Nombre</label>
            <input type="text" id="receta-nombre" required>
            <label>Descripción</label>
            <input type="text" id="receta-descripcion">
            <button type="submit">Agregar Receta</button>
          </form>
        </div>
      `;
    }
    window.renderRecetas = renderRecetas;

    async function addReceta(e) {
      e.preventDefault();
      const nombre = document.getElementById('receta-nombre').value.trim();
      const descripcion = document.getElementById('receta-descripcion').value.trim();
      if (!nombre) return;
      const { data, error } = await db.from('recetas').insert({ nombre, descripcion }).select().single();
      if (!error && data) { state.recetas.push(data); showToast('Receta agregada'); renderRecetas(); }
      else showToast('Error agregando receta');
    }
    window.addReceta = addReceta;

    async function deleteReceta(id) {
      const enUso = state.pedidos.some(p => p.receta_id === id);
      if (enUso) { showToast('No se puede eliminar: receta en uso por pedidos'); return; }
      const { error } = await db.from('recetas').delete().eq('id', id);
      if (!error) { state.recetas = state.recetas.filter(r => r.id !== id); showToast('Receta eliminada'); renderRecetas(); }
      else showToast('Error eliminando receta');
    }
    window.deleteReceta = deleteReceta;

    async function completePedido(id) {
      const { error } = await db.from('pedidos').update({ estado: 'Entregado' }).eq('id', id);
      if (!error) {
        const pedido = state.pedidos.find(p => p.id === id);
        if (pedido) pedido.estado = 'Entregado';
        showToast('Pedido marcado como entregado');
        renderPedidos();
      } else showToast('Error actualizando pedido');
    }
    window.completePedido = completePedido;

    // --- Inicialización ---
    async function init() {
      showToast('Cargando datos...');
      await loadFromSupabase();
      renderDashboard();
      renderInventario();
      renderMermas();
      renderPedidos();
      renderRecetas();
    }
    window.onload = init;
  </script>
</body>
</html>
