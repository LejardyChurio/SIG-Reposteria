<!--
Sistema de Información Gerencial (SIG) para PYME de Repostería Artesanal
SPA Mobile-First, Offline-First, Integración directa con Supabase
Desarrollado por GitHub Copilot (GPT-4.1) | 2026
-->
<!DOCTYPE html>
<html lang="es">
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIG Repostería Artesanal</title>
  <!-- Favicon neutral, pastel minimalista SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cellipse cx='24' cy='38' rx='16' ry='6' fill='%23facc15'/%3E%3Cpath d='M8 38V24c0-8.8 8-14 16-14s16 5.2 16 14v14' fill='%23fff' stroke='%23facc15' stroke-width='2'/%3E%3Cellipse cx='24' cy='24' rx='12' ry='6' fill='%23fde68a' stroke='%23facc15' stroke-width='1.5'/%3E%3C/svg%3E"/>
  <style>
    body { background: #f8fafc; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    .sidebar, .bottom-nav { background: #1e293b; color: #fff; }
    .sidebar { width: 220px; min-height: 100vh; padding: 24px 12px 0 12px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; }
    .sidebar .logo { display: flex; align-items: center; margin-bottom: 32px; }
    .sidebar .logo svg {
      width: 44px;
      height: 44px;
      max-width: 50px;
      max-height: 50px;
      margin-right: 10px;
      display: block;
    }
    .sidebar .logo span { font-size: 1.3rem; font-weight: bold; letter-spacing: 1px; }
    .sidebar .nav-btn { background: none; border: none; color: #fff; text-align: left; padding: 12px 8px; margin-bottom: 8px; border-radius: 6px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
    .sidebar .nav-btn.active, .sidebar .nav-btn:hover { background: #334155; }
    .sidebar .nav-btn svg {
      width: 24px;
      height: 24px;
      max-width: 24px;
      max-height: 24px;
      margin-right: 8px;
      vertical-align: middle;
      object-fit: contain;
      fill: currentColor;
      flex-shrink: 0;
    }
    .main-content { margin-left: 220px; padding: 32px 16px 16px 16px; min-height: 100vh; }
    .spa-view { display: none; }
    .spa-view.active { display: block; }
    .kpi-cards { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .kpi-card { background: #1e293b; color: #fff; border-radius: 12px; padding: 24px 16px; flex: 1 1 220px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 8px #0001; }
    .kpi-card svg { width: 36px; height: 36px; margin-bottom: 8px; }
    .alerta-critica { animation: parpadeo 1s infinite alternate; background: #dc2626; color: #fff; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 18px; }
    @keyframes parpadeo { from { opacity: 1; } to { opacity: 0.4; } }
    .form-card, .table-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px #0001; padding: 20px; margin-bottom: 24px; }
    .form-card label { font-weight: 500; margin-bottom: 4px; display: block; }
    .form-card input, .form-card select { width: 100%; padding: 8px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; }
    .form-card button { background: #1e293b; color: #fff; border: none; border-radius: 6px; padding: 10px 0; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
    .form-card button:hover { background: #334155; }
    .table-card table { width: 100%; border-collapse: collapse; font-size: 0.98rem; }
    .table-card th, .table-card td { padding: 8px 6px; text-align: left; }
    .table-card th { background: #e2e8f0; }
    .table-card tr.critico { background: #fee2e2; }
    .table-card tr { border-bottom: 1px solid #e5e7eb; }
    .btn-entregado { background: #16a34a; color: #fff; border: none; border-radius: 5px; padding: 5px 12px; font-size: 0.95rem; cursor: pointer; }
    .btn-entregado:hover { background: #166534; }
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #facc15; color: #1e293b; padding: 10px 24px; border-radius: 8px; font-weight: bold; z-index: 9999; display: none; }
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding-top: 70px; }
      .bottom-nav { display: flex; }
    }
    .bottom-nav { display: none; position: fixed; left: 0; right: 0; bottom: 0; background: #1e293b; color: #fff; height: 56px; align-items: center; justify-content: space-around; z-index: 100; }
    .bottom-nav .nav-btn { background: none; border: none; color: #fff; font-size: 0.95rem; display: flex; flex-direction: column; align-items: center; padding: 0; }
    .bottom-nav .nav-btn.active, .bottom-nav .nav-btn:hover { color: #facc15; }
    .bottom-nav svg {
      width: 24px;
      height: 24px;
      max-width: 24px;
      max-height: 24px;
      margin-bottom: 2px;
      object-fit: contain;
      fill: currentColor;
      display: block;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="sidebar">
    <div class="logo">
      <!-- Logo SVG: Pastel artesanal refinado, simétrico y escalado -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="24" cy="38" rx="16" ry="6" fill="#facc15"/>
        <path d="M8 38V24c0-8.8 8-14 16-14s16 5.2 16 14v14" fill="#fff" stroke="#facc15" stroke-width="2"/>
        <ellipse cx="24" cy="24" rx="12" ry="6" fill="#fde68a" stroke="#facc15" stroke-width="1.5"/>
        <circle cx="24" cy="18" r="2.2" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
        <path d="M34 18 Q36 12 32 10" stroke="#a3a3a3" stroke-width="1.2" fill="none"/>
        <ellipse cx="32" cy="10" rx="1.2" ry="2.2" fill="#fff" stroke="#a3a3a3" stroke-width="0.8"/>
      </svg>
      <span style="font-size:1.3rem;font-weight:bold;letter-spacing:1px;line-height:1;">SIG Repostería</span>
    </div>
    <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')"><svg viewBox="0 0 24 24"><path d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0L22.25 12M4.5 10.5V19.5A2.25 2.25 0 006.75 21.75h2.25m6 0h2.25A2.25 2.25 0 0019.5 19.5V10.5m-15 0L12 3.75m0 0l7.5 6.75" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Dashboard</button>
    <button class="nav-btn" data-view="inventario" onclick="switchView('inventario')"><svg viewBox="0 0 24 24"><path d="M3 7.5V6a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 6v1.5M3 7.5h18m-18 0v9A2.25 2.25 0 005.25 18.75h13.5A2.25 2.25 0 0021 16.5v-9m-9 6.75h3.75m-3.75 0V12m0 1.5V12" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Inventario</button>
    <button class="nav-btn" data-view="mermas" onclick="switchView('mermas')"><svg viewBox="0 0 24 24"><path d="M12 9v3.75m0 3.75h.008v.008H12v-.008zm9.53 2.22a1.5 1.5 0 01-1.28 2.28H3.75a1.5 1.5 0 01-1.28-2.28l8.25-14.25a1.5 1.5 0 012.56 0l8.25 14.25z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Mermas</button>
    <button class="nav-btn" data-view="pedidos" onclick="switchView('pedidos')"><svg viewBox="0 0 24 24"><path d="M6.75 3v2.25m10.5-2.25v2.25M3.75 7.5h16.5m-16.5 0A2.25 2.25 0 003 9.75v8.25A2.25 2.25 0 005.25 20.25h13.5A2.25 2.25 0 0021 18V9.75a2.25 2.25 0 00-2.25-2.25m-16.5 0V6A2.25 2.25 0 015.25 3.75h13.5A2.25 2.25 0 0121 6v1.5" stroke="#facc15" stroke-width="1.5" fill="none"/></svg> Pedidos</button>
  </div>
  <div class="main-content">
    <div id="alertas"></div>
    <div id="dashboard-view" class="spa-view active"></div>
    <div id="inventario-view" class="spa-view"></div>
    <div id="mermas-view" class="spa-view"></div>
    <div id="pedidos-view" class="spa-view"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')"><svg viewBox="0 0 24 24"><path d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0L22.25 12M4.5 10.5V19.5A2.25 2.25 0 006.75 21.75h2.25m6 0h2.25A2.25 2.25 0 0019.5 19.5V10.5m-15 0L12 3.75m0 0l7.5 6.75" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Dashboard</span></button>
    <button class="nav-btn" data-view="inventario" onclick="switchView('inventario')"><svg viewBox="0 0 24 24"><path d="M3 7.5V6a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 6v1.5M3 7.5h18m-18 0v9A2.25 2.25 0 005.25 18.75h13.5A2.25 2.25 0 0021 16.5v-9m-9 6.75h3.75m-3.75 0V12m0 1.5V12" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Inventario</span></button>
    <button class="nav-btn" data-view="mermas" onclick="switchView('mermas')"><svg viewBox="0 0 24 24"><path d="M12 9v3.75m0 3.75h.008v.008H12v-.008zm9.53 2.22a1.5 1.5 0 01-1.28 2.28H3.75a1.5 1.5 0 01-1.28-2.28l8.25-14.25a1.5 1.5 0 012.56 0l8.25 14.25z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Mermas</span></button>
    <button class="nav-btn" data-view="pedidos" onclick="switchView('pedidos')"><svg viewBox="0 0 24 24"><path d="M6.75 3v2.25m10.5-2.25v2.25M3.75 7.5h16.5m-16.5 0A2.25 2.25 0 003 9.75v8.25A2.25 2.25 0 005.25 20.25h13.5A2.25 2.25 0 0021 18V9.75a2.25 2.25 0 00-2.25-2.25m-16.5 0V6A2.25 2.25 0 015.25 3.75h13.5A2.25 2.25 0 0121 6v1.5" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><span>Pedidos</span></button>
  </div>
  <script>
    // --- Estado y datos mock ---
    const SUPABASE_URL = 'SUPABASE_URL_AQUI';
    const SUPABASE_KEY = 'SUPABASE_KEY_AQUI';
    const DEMO_MODE = SUPABASE_URL === 'SUPABASE_URL_AQUI' || SUPABASE_KEY === 'SUPABASE_KEY_AQUI';
    const LS_KEY = 'sig-reposteria-demo';
    function getDefaultState() {
      return {
        inventario: [
          { id: 1, nombre: 'Harina', stock_actual: 10, stock_seguridad: 5, unidad_medida: 'kg' },
          { id: 2, nombre: 'Azúcar', stock_actual: 8, stock_seguridad: 4, unidad_medida: 'kg' },
          { id: 3, nombre: 'Huevos', stock_actual: 30, stock_seguridad: 12, unidad_medida: 'unid' },
          { id: 4, nombre: 'Mantequilla', stock_actual: 5, stock_seguridad: 2, unidad_medida: 'kg' }
        ],
        mermas: [],
        pedidos: [],
        nextInsumoId: 5,
        nextMermaId: 1,
        nextPedidoId: 1
      };
    }
    function loadState() {
      if (DEMO_MODE) {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) try { return JSON.parse(raw); } catch { }
        return getDefaultState();
      }
      // Aquí iría la lógica real con Supabase
      return getDefaultState();
    }
    function saveState() {
      if (DEMO_MODE) localStorage.setItem(LS_KEY, JSON.stringify(state));
    }
    let state = loadState();

    // --- Utilidades UI ---
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2200);
    }

    // --- SPA Navegación ---
    function switchView(view) {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-view') === view);
      });
      document.querySelectorAll('.spa-view').forEach(div => {
        div.classList.remove('active');
      });
      const v = document.getElementById(view+'-view');
      if (v) v.classList.add('active');
      if (view === 'dashboard') renderDashboard();
      if (view === 'inventario') renderInventario();
      if (view === 'mermas') renderMermas();
      if (view === 'pedidos') renderPedidos();
    }
    window.switchView = switchView;

    // --- Renderizado de Vistas ---
    function renderDashboard() {
      const el = document.getElementById('dashboard-view');
      let totalPedidos = state.pedidos.length;
      let insumosCriticos = state.inventario.filter(i => i.stock_actual <= i.stock_seguridad).length;
      let totalMermas = state.mermas.length;
      el.innerHTML = `
        <div class="kpi-cards">
          <div class="kpi-card"><svg viewBox="0 0 24 24"><path d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0L22.25 12" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><div><b>${state.inventario.length}</b> Insumos</div></div>
          <div class="kpi-card"><svg viewBox="0 0 24 24"><path d="M12 9v3.75m0 3.75h.008v.008H12v-.008zm9.53 2.22a1.5 1.5 0 01-1.28 2.28H3.75a1.5 1.5 0 01-1.28-2.28l8.25-14.25a1.5 1.5 0 012.56 0l8.25 14.25z" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><div><b>${totalMermas}</b> Mermas</div></div>
          <div class="kpi-card"><svg viewBox="0 0 24 24"><path d="M6.75 3v2.25m10.5-2.25v2.25M3.75 7.5h16.5" stroke="#facc15" stroke-width="1.5" fill="none"/></svg><div><b>${totalPedidos}</b> Pedidos</div></div>
        </div>
        ${insumosCriticos > 0 ? `<div class="alerta-critica">¡Atención! Hay ${insumosCriticos} insumos en nivel crítico.</div>` : ''}
        <div class="form-card">
          <h3>Registrar Merma</h3>
          <form onsubmit="return addMerma(event)">
            <label>Insumo</label>
            <select id="merma-insumo">
              ${state.inventario.map(i => `<option value="${i.id}">${i.nombre}</option>`).join('')}
            </select>
            <label>Cantidad</label>
            <input type="number" id="merma-cantidad" min="1" required>
            <button type="submit">Registrar Merma</button>
          </form>
        </div>
      `;
    }
    window.renderDashboard = renderDashboard;

    function renderInventario() {
      const el = document.getElementById('inventario-view');
      // Simulación de movimientos con timestamp para RF-01
      const movimientos = [
        { nombre: 'Harina', tipo: 'Entrada', cantidad: 10, fecha: '2026-05-29 09:00' },
        { nombre: 'Azúcar', tipo: 'Salida', cantidad: 2, fecha: '2026-05-29 10:15' },
        { nombre: 'Huevos', tipo: 'Entrada', cantidad: 12, fecha: '2026-05-29 11:30' },
        { nombre: 'Mantequilla', tipo: 'Salida', cantidad: 1, fecha: '2026-05-29 12:00' }
      ];
      el.innerHTML = `
        <div class="table-card">
          <h3>Inventario de Insumos</h3>
          <table><thead><tr><th>Nombre</th><th>Stock</th><th>Seguridad</th><th>Unidad</th><th></th></tr></thead><tbody>
            ${state.inventario.map(i => `
              <tr${i.stock_actual <= i.stock_seguridad ? ' class="critico"' : ''}>
                <td>${i.nombre}</td>
                <td>${i.stock_actual}</td>
                <td>${i.stock_seguridad}</td>
                <td>${i.unidad_medida}</td>
                <td><button onclick="deleteInsumo(${i.id})">Eliminar</button></td>
              </tr>
            `).join('')}
          </tbody></table>
        </div>
        <div class="table-card">
          <h3>Movimientos de Inventario <span style='font-weight:normal;font-size:0.95em;'>(Trazabilidad)</span></h3>
          <table><thead><tr><th>Insumo</th><th>Tipo</th><th>Cantidad</th><th>Timestamp</th></tr></thead><tbody>
            ${movimientos.map(m => `
              <tr><td>${m.nombre}</td><td>${m.tipo}</td><td>${m.cantidad}</td><td>${m.fecha}</td></tr>
            `).join('')}
          </tbody></table>
        </div>
        <div class="form-card">
          <h3>Agregar Insumo</h3>
          <form onsubmit="return addInsumo(event)">
            <label>Nombre</label>
            <input type="text" id="insumo-nombre" required>
            <label>Stock Inicial</label>
            <input type="number" id="insumo-stock" min="0" required>
            <label>Stock Seguridad</label>
            <input type="number" id="insumo-seguridad" min="0" required>
            <label>Unidad de Medida</label>
            <input type="text" id="insumo-unidad" required>
            <button type="submit">Agregar Insumo</button>
          </form>
        </div>
      `;
    }
    window.renderInventario = renderInventario;

    function renderMermas() {
      const el = document.getElementById('mermas-view');
      el.innerHTML = `
        <div class="table-card">
          <h3>Historial de Mermas</h3>
          <table><thead><tr><th>Insumo</th><th>Cantidad</th><th>Fecha</th></tr></thead><tbody>
            ${state.mermas.map(m => {
              const insumo = state.inventario.find(i => i.id === m.insumoId);
              return `<tr><td>${insumo ? insumo.nombre : 'Desconocido'}</td><td>${m.cantidad}</td><td>${m.fecha}</td></tr>`;
            }).join('')}
          </tbody></table>
        </div>
      `;
    }
    window.renderMermas = renderMermas;

    function renderPedidos() {
      const el = document.getElementById('pedidos-view');
      el.innerHTML = `
        <div class="table-card">
          <h3>Pedidos</h3>
          <table><thead><tr><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>Estado</th><th></th></tr></thead><tbody>
            ${state.pedidos.map(p => `
              <tr>
                <td>${p.cliente}</td>
                <td>${p.producto}</td>
                <td>${p.cantidad}</td>
                <td>${p.entregado ? 'Entregado' : 'Pendiente'}</td>
                <td>${!p.entregado ? `<button class='btn-entregado' onclick='completePedido(${p.id})'>Marcar Entregado</button>` : ''}</td>
              </tr>
            `).join('')}
          </tbody></table>
        </div>
        <div class="form-card">
          <h3>Nuevo Pedido</h3>
          <form onsubmit="return addPedido(event)">
            <label>Cliente</label>
            <input type="text" id="pedido-cliente" required>
            <label>Producto</label>
            <input type="text" id="pedido-producto" required>
            <label>Cantidad</label>
            <input type="number" id="pedido-cantidad" min="1" required>
            <button type="submit">Agregar Pedido</button>
          </form>
        </div>
      `;
    }
    window.renderPedidos = renderPedidos;

    // --- Acciones ---
    function addInsumo(e) {
      e.preventDefault();
      const nombre = document.getElementById('insumo-nombre').value.trim();
      const stock = parseInt(document.getElementById('insumo-stock').value, 10);
      const seguridad = parseInt(document.getElementById('insumo-seguridad').value, 10);
      const unidad = document.getElementById('insumo-unidad').value.trim();
      if (!nombre || isNaN(stock) || isNaN(seguridad) || !unidad) return false;

      // --- REGLA 1: UPSERT LOCAL (NO DUPLICADOS) ---
      const nombreLower = nombre.toLocaleLowerCase();
      let insumoExistente = state.inventario.find(i => i.nombre.toLocaleLowerCase() === nombreLower);
      let objetoInsumo;
      if (insumoExistente) {
        // Sumar stock al existente
        insumoExistente.stock_actual += stock;
        insumoExistente.stock_seguridad = seguridad; // Permite actualizar el stock de seguridad
        insumoExistente.unidad_medida = unidad;
        objetoInsumo = {
          id: insumoExistente.id,
          nombre: insumoExistente.nombre,
          stock_actual: insumoExistente.stock_actual,
          stock_seguridad: insumoExistente.stock_seguridad,
          unidad_medida: insumoExistente.unidad_medida
        };
      } else {
        // Nuevo insumo
        objetoInsumo = {
          id: state.nextInsumoId++,
          nombre: nombre,
          stock_actual: stock,
          stock_seguridad: seguridad,
          unidad_medida: unidad
        };
        state.inventario.push(objetoInsumo);
      }

      // --- REGLA 2: ENRUTAMIENTO AL MOTOR HÍBRIDO ---
      if (window.guardarTransaccion) {
        window.guardarTransaccion('insumos', objetoInsumo);
      }

      saveState();
      showToast('Insumo actualizado');
      renderInventario();

      // --- REGLA 3: REFRESCO DE ALERTAS ---
      if (window.verificarStockCritico) {
        window.verificarStockCritico(state.inventario);
      }

      return false;
    }
    window.addInsumo = addInsumo;

    function deleteInsumo(id) {
      state.inventario = state.inventario.filter(i => i.id !== id);
      saveState();
      showToast('Insumo eliminado');
      renderInventario();
    }
    window.deleteInsumo = deleteInsumo;

    function addMerma(e) {
      e.preventDefault();
      const insumoId = parseInt(document.getElementById('merma-insumo').value, 10);
      const cantidad = parseInt(document.getElementById('merma-cantidad').value, 10);
      if (isNaN(insumoId) || isNaN(cantidad) || cantidad < 1) return false;
      const insumo = state.inventario.find(i => i.id === insumoId);
      if (!insumo) return false;
      insumo.stock_actual = Math.max(0, insumo.stock_actual - cantidad);
      state.mermas.push({ id: state.nextMermaId++, insumoId, cantidad, fecha: new Date().toLocaleString() });
      saveState();
      showToast('Merma registrada');
      renderDashboard();
      return false;
    }
    window.addMerma = addMerma;

    function addPedido(e) {
      e.preventDefault();
      const cliente = document.getElementById('pedido-cliente').value.trim();
      const producto = document.getElementById('pedido-producto').value.trim();
      const cantidad = parseInt(document.getElementById('pedido-cantidad').value, 10);
      if (!cliente || !producto || isNaN(cantidad) || cantidad < 1) return false;
      state.pedidos.push({ id: state.nextPedidoId++, cliente, producto, cantidad, entregado: false });
      saveState();
      showToast('Pedido agregado');
      renderPedidos();
      return false;
    }
    window.addPedido = addPedido;

    function completePedido(id) {
      const pedido = state.pedidos.find(p => p.id === id);
      if (pedido) pedido.entregado = true;
      saveState();
      showToast('Pedido entregado');
      renderPedidos();
    }
    window.completePedido = completePedido;

    // --- Inicialización ---
    function init() {
      renderDashboard();
      renderInventario();
      renderMermas();
      renderPedidos();
    }
    window.onload = init;
  </script>
</body>
</html>
